# ============================================================================
# BaZi Engine Configuration
# All configurable data in one place. Loaded by Go server at startup.
# ============================================================================

# --------------------------------------------------------------------------
# Tabs — defines what insight categories appear in the frontend dashboard.
# Icon is a string key; frontend maps it to an SVG component.
# --------------------------------------------------------------------------
tabs:
  - key: romance
    label: Romance
    icon: heart
  - key: health
    label: Health
    icon: person
  - key: career
    label: Career
    icon: briefcase
  - key: wealth
    label: Wealth
    icon: circles

# --------------------------------------------------------------------------
# Element metadata — labels, short codes, hex colors (used by frontend).
# --------------------------------------------------------------------------
elements:
  wood:
    label: Wood
    short: WOOD
    color: "#5E8A4C"
  fire:
    label: Fire
    short: FIRE
    color: "#BD5B3B"
  earth:
    label: Earth
    short: EARTH
    color: "#A97C34"
  metal:
    label: Metal
    short: METAL
    color: "#6E7B8C"
  water:
    label: Water
    short: WATER
    color: "#35708E"

# --------------------------------------------------------------------------
# Heavenly Stems (天干) — 10 stems, index 0-9.
# --------------------------------------------------------------------------
heavenly_stems:
  - index: 0
    name: Jia
    element: wood
    polarity: yang
  - index: 1
    name: Yi
    element: wood
    polarity: yin
  - index: 2
    name: Bing
    element: fire
    polarity: yang
  - index: 3
    name: Ding
    element: fire
    polarity: yin
  - index: 4
    name: Wu
    element: earth
    polarity: yang
  - index: 5
    name: Ji
    element: earth
    polarity: yin
  - index: 6
    name: Geng
    element: metal
    polarity: yang
  - index: 7
    name: Xin
    element: metal
    polarity: yin
  - index: 8
    name: Ren
    element: water
    polarity: yang
  - index: 9
    name: Gui
    element: water
    polarity: yin

# --------------------------------------------------------------------------
# Earthly Branches (地支) — 12 branches, index 0-11.
# hidden_stems: indices into heavenly_stems[] that reside in this branch.
# --------------------------------------------------------------------------
earthly_branches:
  - index: 0
    name: Zi
    animal: Rat
    element: water
    polarity: yang
    hidden_stems: [9]
  - index: 1
    name: Chou
    animal: Ox
    element: earth
    polarity: yin
    hidden_stems: [5, 9, 7]
  - index: 2
    name: Yin
    animal: Tiger
    element: wood
    polarity: yang
    hidden_stems: [0, 2, 4]
  - index: 3
    name: Mao
    animal: Rabbit
    element: wood
    polarity: yin
    hidden_stems: [1]
  - index: 4
    name: Chen
    animal: Dragon
    element: earth
    polarity: yang
    hidden_stems: [4, 1, 9]
  - index: 5
    name: Si
    animal: Snake
    element: fire
    polarity: yin
    hidden_stems: [2, 4, 6]
  - index: 6
    name: Wu
    animal: Horse
    element: fire
    polarity: yang
    hidden_stems: [3, 5]
  - index: 7
    name: Wei
    animal: Goat
    element: earth
    polarity: yin
    hidden_stems: [5, 3, 1]
  - index: 8
    name: Shen
    animal: Monkey
    element: metal
    polarity: yang
    hidden_stems: [6, 4, 8]
  - index: 9
    name: You
    animal: Rooster
    element: metal
    polarity: yin
    hidden_stems: [7]
  - index: 10
    name: Xu
    animal: Dog
    element: earth
    polarity: yang
    hidden_stems: [4, 7, 3]
  - index: 11
    name: Hai
    animal: Pig
    element: water
    polarity: yin
    hidden_stems: [8, 0]

# --------------------------------------------------------------------------
# Element cycles — indices matching heavenly_stems/earthly_branches elements.
# productive: Wood(0)→Fire(1)→Earth(2)→Metal(3)→Water(4)→Wood(0)
# controlling: Wood(0)→Earth(2)→Water(4)→Fire(1)→Metal(3)→Wood(0)
# --------------------------------------------------------------------------
element_cycles:
  productive: [1, 2, 3, 4, 0]
  controlling: [2, 3, 4, 0, 1]

# --------------------------------------------------------------------------
# Seasons — which branches belong to which season, and the peak element.
# --------------------------------------------------------------------------
seasons:
  - name: spring
    peak_element: wood
    branches: [2, 3, 4]
  - name: summer
    peak_element: fire
    branches: [5, 6, 7]
  - name: autumn
    peak_element: metal
    branches: [8, 9, 10]
  - name: winter
    peak_element: water
    branches: [11, 0, 1]

